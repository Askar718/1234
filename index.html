<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duollingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        .status {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Duollingo</h1>
        <p class="status">Сайт успешно работает!</p>
        <p>GitHub Pages подключён правильно.</p>
        <p id="time"></p>
    </div>

    <script>
        document.getElementById("time").textContent =
            "Проверка: " + new Date().toLocaleString();
    </script>
</body>
</html>
